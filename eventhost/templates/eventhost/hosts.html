{%extends 'eventhost/base.html'%}
{% block content %}

<section class="host">
	<div class="host-list">
		
			<div class="host-item">
					{%for host in hosts%}
						<div>
							<div class="host-top">
								<div class="host-img-div">
									<img class="host-img-top" height="400px" width="500px" src="https://a0.muscache.com/im/pictures/841cc982-6831-4ea3-8578-5581f6daf062.jpg?im_w=720">
								</div>
								<div class="host-info">
									<small>Company name: </small>
									<h4 class="host-title">{{host.management_name}}</h4>
									<i class="fa-solid fa-location-dot" style="margin-left: 2%;"></i>
									<p class="host-location">{{host.location}}</p>
									<h5>Description: </h5>
									<p class="host-text host-text-top">{{host.description}}</p>
									<div class="detail-link">
										<a href="{%url 'host-detail' host.id%}" class="detail-btn">Detail &raquo;</a>
										<a href="{%url 'eventbooking' host.id%}" class="detail-btn book-now">Book Now !</a>
									</div>
									
								</div>
							</div>
							<hr class="hostline">
						</div>

					{%endfor%}
			</div>
	</div>

</section>


{% endblock content %}
