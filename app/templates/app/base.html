{%load static%}
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

	<link rel="stylesheet" type="text/css" href="{%static 'app/main.css'%}">


	<script src="https://kit.fontawesome.com/a34dbf6751.js" crossorigin="anonymous"></script>

	<link rel="stylesheet" href="//netdna.bootstrapcdn.com/font-awesome/4.2.0/css/font-awesome.min.css">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">

	<script src="https://kit.fontawesome.com/a34dbf6751.js" crossorigin="anonymous"></script>

	<!-- Google font imports -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@900&family=Hind+Siliguri&family=Libre+Franklin:wght@700&family=Rowdies:wght@700&display=swap" rel="stylesheet">
	

</head>
<body>
	<nav class="navbar navbar-expand-lg" id="basenav">
	  <div class="container-fluid">
	    <a class="navbar-brand" id="brnd" href="{%url 'home'%}">evement</a>
	    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
	      <span class="navbar-toggler-icon"></span>
	    </button>
	    <div class="collapse navbar-collapse" id="navbarNavDropdown">
	      <ul class="navbar-nav" id="homenav">
	        {%if user.is_authenticated%}
	      		<li class="nav-item">
		          <a class="nav-link " id="homeLink" href="{%url 'profile'%}">{{request.user.name}}</a>
		        </li>
		        <li class="nav-item">
		          <a class="nav-link " id="homeLink" href="{%url 'logout'%}">logout</a>
		        </li>
		        <li class="nav-item">
		          <a class="nav-link " id="homeLink" href="{%url 'about-us'%}">about us</a>
		        </li>
		    {%else%}
		        <li class="nav-item">
		          <a class="nav-link " id="homeLink" href="{%url 'login' %}">login</a>
		        </li>
		        <li class="nav-item">
		          <a class="nav-link " id="homeLink" href="{%url 'about-us'%}">about us</a>
		        </li>
		        <li class="nav-item">
		          <a class="nav-link " id="homeLink" href="{%url 'register' %}">Register</a>
		        </li>
	        {%endif%}
	      </ul>
	    </div>
	  </div>
	</nav>


	{% if messages %}
          {% for message in messages %}
	            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
				   {{ message }}
				  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
				</div>
          {% endfor %}
        {% endif %}
	{%block content%}
	{%endblock content%}

	

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>



</body>
</html>
